name: Rust

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: anisub-cli

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose

  build-linux:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Install packaging tools
        run: |
          cargo install cargo-generate-rpm --locked
          wget -q -O linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy

      - name: Strip binary
        run: strip target/release/${{ env.BIN_NAME }}

      - name: Build .rpm
        run: cargo generate-rpm

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp target/release/${{ env.BIN_NAME }} AppDir/usr/bin/

          cat > AppDir/${{ env.BIN_NAME }}.desktop << EOF
          [Desktop Entry]
          Name=${{ env.BIN_NAME }}
          Exec=${{ env.BIN_NAME }}
          Icon=${{ env.BIN_NAME }}
          Type=Application
          Categories=Utility;
          EOF

          # Basit bir placeholder ikon - kendi ikonun varsa repo'dan kopyala
          if [ -f assets/icon.png ]; then
            cp assets/icon.png AppDir/${{ env.BIN_NAME }}.png
          else
            convert -size 256x256 xc:gray AppDir/${{ env.BIN_NAME }}.png 2>/dev/null || touch AppDir/${{ env.BIN_NAME }}.png
          fi

          ./linuxdeploy --appdir AppDir --output appimage

      - name: Rename artifacts
        run: |
          mv target/generate-rpm/*.rpm ./${{ env.BIN_NAME }}-linux.rpm
          mv *.AppImage ./${{ env.BIN_NAME }}-linux.AppImage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            ${{ env.BIN_NAME }}-linux.rpm
            ${{ env.BIN_NAME }}-linux.AppImage

  build-windows:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Rename exe
        shell: cmd
        run: copy target\release\${{ env.BIN_NAME }}.exe ${{ env.BIN_NAME }}-windows.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: ${{ env.BIN_NAME }}-windows.exe

  release:
    needs: [ build-linux, build-windows ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-packages/*.rpm
            linux-packages/*.AppImage
            windows-package/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
